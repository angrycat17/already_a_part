<!DOCTYPE html>
<html lang="en">
<head>
<style>
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
}

.nav {
  display: flex;
  gap: 20px;
}

.burger {
  display: none;
  font-size: 24px;
  background: none;
  border: none;
}
@media (max-width: 768px) {
  .nav {
    position: absolute;
    top: 60px;
    right: 0;
    background: white;
    flex-direction: column;
    width: 200px;
    display: none;
  }

  .nav.active {
    display: flex;
  }

  .burger {
    display: block;
  }
}
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header class="header">
  <div class="logo">Logo</div>

  <nav class="nav" id="nav">
    <a href="#">Головна</a>
    <a href="#">Про нас</a>
    <a href="#">Контакти</a>
  </nav>

  <button class="burger" id="burger">
    ☰
  </button>
</header>
<script>
  const burger = document.getElementById('burger');
  const nav = document.getElementById('nav');

  burger.addEventListener('click', () => {
    nav.classList.toggle('active');
  });
</script>
</body>
</html>
